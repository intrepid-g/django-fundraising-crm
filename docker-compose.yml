version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fundraising_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://crm_user:crm_pass@db:5432/fundraising_crm
      - REDIS_URL=redis://redis:6379/0

  celery:
    build: ./backend
    command: celery -A fundraising_crm worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
