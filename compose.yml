# Modern Django Stack - compose.yml
# Docker Compose for development

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: django_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEBUG: "true"
      DATABASE_URL: postgres://postgres:postgres@db:5432/django_crm
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:
